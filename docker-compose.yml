# Marketing Trends — local, single-container deployment.
#
#   docker compose up --build -d      # start (first run builds the image)
#   open http://localhost:8001
#   docker compose down               # stop
#
# All data lives in the bind-mounted folders below, so it survives restarts,
# rebuilds, and `docker compose down`. Deleting ./data wipes the local corpus.

services:
  app:
    build: .
    image: marketing-trends:local
    container_name: marketing-trends
    ports:
      - "8001:8001"
    volumes:
      # Local corpus (SQLite DB) + downloaded media. The source of truth.
      - ./data:/app/data
      # Per-persona browser profiles (login sessions for harvesting).
      - ./profiles:/app/profiles
      # Platform session secrets / .env — kept out of the image on purpose.
      - ./secrets:/app/secrets
    # Chromium (Playwright) crashes with the default 64MB /dev/shm; give it room.
    shm_size: "1gb"
    # Reap zombie browser processes and forward signals cleanly.
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
